{% extends 'base/base.html' %}
{% block content %}
    
    <form action="" method="POST" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}
        
        
        <div class="space-y-4 [&_p]:flex [&_p]:flex-col [&_p]:gap-1.5 [&_label]:text-sm [&_label]:font-semibold [&_label]:text-gray-700 [&_input]:w-full [&_input]:p-2.5 [&_input]:border [&_input]:border-gray-300 [&_input]:rounded-lg [&_input]:shadow-sm [&_input:focus]:ring-2 [&_input:focus]:ring-blue-500/20 [&_input:focus]:border-blue-500 [&_input:focus]:outline-none [&_select]:w-full [&_select]:p-2.5 [&_select]:border [&_select]:border-gray-300 [&_select]:rounded-lg [&_select]:bg-white [&_textarea]:w-full [&_textarea]:p-2.5 [&_textarea]:border [&_textarea]:border-gray-300 [&_textarea]:rounded-lg [&_textarea]:h-28">
            
            
            {{ form.as_p }}
            
        </div>
        
        
        <div class="pt-5 border-t border-gray-100 flex flex-col sm:flex-row justify-end gap-3 mt-6">
            <a href="{% url 'dashboard' %}" class="w-full sm:w-auto text-center bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 px-6 rounded-lg text-sm transition order-2 sm:order-1">
                
            </a>
            <button type="submit" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-lg text-sm shadow-sm transition duration-150 cursor-pointer order-1 sm:order-2">
                {{ btn }}
            </button>
        </div>
    </form>
</div>

{% endblock content %}
